name: Build Radio APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare web dir (flat repo friendly)
        run: |
          mkdir -p wwwbuild
          if [ -f www/index.html ]; then cp www/index.html wwwbuild/index.html; \
          elif [ -f index.html ]; then cp index.html wwwbuild/index.html; fi
          mkdir -p resources
          if [ ! -f resources/icon.png ] && [ -f icon.png ]; then cp icon.png resources/icon.png; fi
          if [ ! -f resources/splash.png ] && [ -f splash.png ]; then cp splash.png resources/splash.png; fi
          echo "---- wwwbuild ----"; ls -la wwwbuild; echo "---- resources ----"; ls -la resources || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm install
      - name: Add Android platform
        run: npx cap add android
      - name: Set app version (1.0.0 / code 1)
        run: |
          G=android/app/build.gradle
          sed -i 's/versionCode .*/versionCode 1/' "$G"
          sed -i 's/versionName .*/versionName "1.0.0"/' "$G"
          grep -E "versionCode|versionName" "$G" || true
      - name: Inject media widget (native)
        run: |
          PKG=android/app/src/main/java/com/bobik/radio
          mkdir -p "$PKG"
          echo "" | base64 -d > "$PKG/MediaService.java"
          echo "" | base64 -d > "$PKG/MediaWidgetPlugin.java"
          echo "" | base64 -d > "$PKG/MainActivity.java"
          echo "" | base64 -d > "$PKG/AlarmPlugin.java"
          echo "" | base64 -d > "$PKG/AlarmReceiver.java"
          M=android/app/src/main/AndroidManifest.xml
          grep -q FOREGROUND_SERVICE_MEDIA_PLAYBACK "$M" || sed -i 's#</manifest>#<uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"/>\n<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n<uses-permission android:name="android.permission.WAKE_LOCK"/>\n</manifest>#' "$M"
          grep -q 'MediaService' "$M" || sed -i 's#</application>#<service android:name=".MediaService" android:exported="false" android:foregroundServiceType="mediaPlayback"/>\n</application>#' "$M"
          grep -q 'AlarmReceiver' "$M" || sed -i 's#</application>#<receiver android:name=".AlarmReceiver" android:exported="false"/>\n</application>#' "$M"
          echo "----- Manifest -----"; cat "$M"
      - name: Generate icon & splash
        run: npx capacitor-assets generate --android || echo "assets step skipped"
      - name: Sync web assets
        run: npx cap sync android
      - name: Accept Android licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
      - name: Build APK (release signed if keystore set, else debug)
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}
          STOREPASS: ${{ secrets.KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > release.keystore
            KEYPASS="${KEYPASS:-$STOREPASS}"
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
              -Pandroid.injected.signing.store.password="$STOREPASS" \
              -Pandroid.injected.signing.key.alias="$ALIAS" \
              -Pandroid.injected.signing.key.password="$KEYPASS"
          else
            echo "::warning::KEYSTORE_BASE64 не задан — собираю DEBUG. Для RuStore нужен release (настройте секреты)."
            ./gradlew assembleDebug --no-daemon
          fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Radio-APK
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
